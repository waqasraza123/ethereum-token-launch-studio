name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Check formatting
        run: pnpm format:check

      - name: Run lint
        run: pnpm lint

      - name: Validate TypeScript config
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build runtime packages
        run: pnpm build

      - name: Validate workspace foundation
        run: pnpm validate:foundation
